<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Presupuestos — Base de Precios</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --orange: #ff6b00;
    --orange2: #ff8c38;
    --text: #e8e8e8;
    --muted: #888;
    --green: #4caf7d;
    --red: #e05353;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--orange);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--orange);
  }
  header span {
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
  }
/* LAYOUT */
.layout {
  display: flex;
  height: calc(100vh - 56px);
  overflow: hidden;
}

.layout-left {
  display: flex;
  flex: 1;
  min-width: 0;
  overflow: hidden;
}

/* RESIZER DIVIDER */
.resizer {
  width: 5px;
  background: var(--border);
  cursor: col-resize;
  flex-shrink: 0;
  position: relative;
  transition: background 0.15s;
  z-index: 10;
}
.resizer:hover, .resizer.dragging {
  background: var(--orange);
}
.resizer::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 1px;
  height: 40px;
  background: currentColor;
  opacity: 0.4;
  border-radius: 2px;
}

/* PRESUPUESTO PANEL */
.presupuesto {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  width: 460px;
  min-width: 320px;
 max-width: 100%;
  flex-shrink: 0;
}
  
  

  /* SIDEBAR CATEGORÍAS */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
    width: 260px;
    min-width: 160px;
    flex-shrink: 0;
  }
  .sidebar-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 8px 16px 12px;
  }
  .cat-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 16px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .cat-item:hover { background: var(--surface2); }
  .cat-item.active {
    background: var(--surface2);
    border-left-color: var(--orange);
    color: var(--orange2);
  }
  .cat-item .cat-name { font-size: 13px; font-weight: 500; }
  .cat-item .cat-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 10px;
  }

  /* MAIN PANEL */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex: 1;
    min-width: 0;
  }

  .search-bar {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .search-bar input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border 0.15s;
  }
  .search-bar input:focus { border-color: var(--orange); }
  .search-bar input::placeholder { color: var(--muted); }

  .results-info {
    padding: 8px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  /* TABLE */
  .table-wrap {
    flex: 1;
    overflow-y: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    background: var(--surface2);
    padding: 9px 12px;
    text-align: left;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    position: sticky;
    top: 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--orange2); }
  thead th.sorted { color: var(--orange); }

  tbody tr {
    border-bottom: 1px solid #1f1f1f;
    transition: background 0.1s;
    cursor: pointer;
  }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.selected { background: #2a1800; border-left: 3px solid var(--orange); }

  td {
    padding: 8px 12px;
    font-size: 13px;
  }
  td.cod {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--orange2);
    white-space: nowrap;
  }
  td.uni {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    width: 50px;
  }
  td.precio {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    text-align: right;
    white-space: nowrap;
    color: #b8e0c8;
  }
  td.add-btn { width: 36px; text-align: center; }
  .btn-add {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 26px; height: 26px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-add:hover {
    border-color: var(--orange);
    color: var(--orange);
    background: #2a1800;
  }

  /* PAGINATION */
  .pagination {
    padding: 10px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }
  .page-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    transition: all 0.15s;
  }
  .page-btn:hover, .page-btn.active {
    border-color: var(--orange);
    color: var(--orange);
  }
  .page-btn:disabled { opacity: 0.3; cursor: default; }
  .page-info {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* PRESUPUESTO PANEL — definido en sección LAYOUT */

  .pres-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .pres-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--orange);
    margin-bottom: 8px;
  }
  .pres-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .pres-meta input, .pres-meta textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 8px;
    border-radius: 3px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    outline: none;
    resize: none;
    transition: border 0.15s;
  }
  .pres-meta input:focus, .pres-meta textarea:focus { border-color: var(--orange); }
  .pres-meta input::placeholder, .pres-meta textarea::placeholder { color: #555; }
  .pres-meta .full { grid-column: 1/-1; }

  /* LINE ITEMS */
  .pres-items {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .pres-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    gap: 8px;
  }
  .pres-empty .icon { font-size: 40px; opacity: 0.3; }
  .pres-empty p { font-size: 12px; text-align: center; line-height: 1.6; }

  .line-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 6px;
    padding: 8px 10px;
    position: relative;
  }
  .line-item:hover { border-color: #3e3e3e; }

  .line-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .line-desc {
    font-size: 12px;
    line-height: 1.4;
    flex: 1;
  }
  .line-desc .code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--orange2);
    margin-bottom: 2px;
  }
  .line-remove {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 14px;
    padding: 0 2px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .line-remove:hover { color: var(--red); }

  .line-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }
  .line-controls label {
    font-size: 10px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
  }
  .line-controls input[type=number],
  .line-controls input.qty-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 6px;
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    width: 70px;
    outline: none;
    -moz-appearance: textfield;
    appearance: textfield;
  }
  .line-controls input[type=number]::-webkit-inner-spin-button,
  .line-controls input[type=number]::-webkit-outer-spin-button { display: none; }
  .line-controls input[type=number]:focus,
  .line-controls input.qty-input:focus { border-color: var(--orange); }
  .line-total {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--green);
  }
  .line-unit {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  /* TOTALS */
  .pres-totals {
    background: var(--surface2);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
  }
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
  }
  .total-row .label { color: var(--muted); }
  .total-row .value { color: var(--text); }
  .total-row.main {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    font-size: 16px;
  }
  .total-row.main .label { color: var(--orange); font-size: 14px; letter-spacing: 1px; }
  .total-row.main .value { color: var(--orange); }

  /* IVA INPUT */
  .iva-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }
  .iva-row label { color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .iva-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    width: 50px;
    text-align: center;
    outline: none;
  }
  .iva-row input:focus { border-color: var(--orange); }

  /* ACTIONS */
  .pres-actions {
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    border-top: 1px solid var(--border);
  }
  .btn {
    flex: 1;
    padding: 9px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--orange);
    color: #000;
  }
  .btn-primary:hover { background: var(--orange2); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--orange); color: var(--orange); }
  .btn-danger {
    background: none;
    color: var(--muted);
    border: 1px solid var(--border);
    flex: 0;
    padding: 9px 14px;
  }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }

  /* LOADING */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 16px;
  }
  #loading h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    color: var(--orange);
  }
  #loading p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--surface2);
    border: 1px solid var(--orange);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    z-index: 1000;
    animation: fadeInOut 2.5s ease forwards;
  }
  @keyframes fadeInOut {
    0% { opacity: 0; transform: translateY(10px); }
    15% { opacity: 1; transform: translateY(0); }
    75% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* SCROLLBARS */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }

  .highlight { background: #ff6b0040; border-radius: 2px; }
</style>
</head>
<body>

<div id="loading">
  <h2>CARGANDO BASE DE PRECIOS</h2>
  <div class="spinner"></div>
  <p id="load-status">Descomprimiendo datos...</p>
</div>

<header>
  <h1>⚡ PRESUPUESTADOR</h1>
  <span id="db-info">BASE DE PRECIOS · CARGANDO...</span>
</header>

<div class="layout">
  <div class="layout-left">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-title">Categorías</div>
      <div id="categories"></div>
    </div>

    <!-- MAIN TABLE -->
    <div class="main">
      <div class="search-bar">
        <input type="text" id="search" placeholder="Buscar por código, descripción..." />
      </div>
      <div class="results-info" id="results-info">—</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th onclick="sort('cod')" class="sorted" id="th-cod">CÓDIGO ↑</th>
              <th>DESCRIPCIÓN</th>
              <th onclick="sort('uni')" id="th-uni">UD</th>
              <th onclick="sort('precio')" id="th-precio">PRECIO (€)</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- RESIZER DIVIDER -->
  <div class="resizer" id="resizer" title="Arrastra para redimensionar"></div>

  <!-- PRESUPUESTO -->
  <div class="presupuesto">
    <div class="pres-header">
      <h2>📋 PRESUPUESTO</h2>
      <div class="pres-meta">
        <input type="text" id="pres-titulo" placeholder="Título del presupuesto" class="full" />
        <input type="text" id="pres-cliente" placeholder="Cliente" />
        <input type="date" id="pres-fecha" />
        <textarea id="pres-obs" placeholder="Observaciones..." class="full" rows="2"></textarea>
      </div>
    </div>
    <div class="pres-items" id="pres-items">
      <div class="pres-empty">
        <div class="icon">📄</div>
        <p>Haz clic en <strong>+</strong> en cualquier partida<br>para añadirla al presupuesto</p>
      </div>
    </div>
    <div class="pres-totals">
      <div class="total-row">
        <span class="label">Subtotal</span>
        <span class="value" id="total-base">0,00 €</span>
      </div>
      <div class="iva-row">
        <label>IVA</label>
        <input type="number" id="iva-pct" value="21" min="0" max="100" oninput="updateTotals()" />
        <label>%</label>
        <span style="margin-left:auto;font-family:IBM Plex Mono,monospace;font-size:12px;color:var(--text)" id="total-iva">0,00 €</span>
      </div>
      <div class="total-row main">
        <span class="label">TOTAL</span>
        <span class="value" id="total-final">0,00 €</span>
      </div>
    </div>
    <div class="pres-actions">
      <button class="btn btn-primary" onclick="exportExcel()">⬇ Excel</button>
      <button class="btn btn-secondary" onclick="printPres()">🖨️ Imprimir</button>
      <button class="btn btn-danger" onclick="clearPres()" title="Vaciar presupuesto">🗑</button>
    </div>
  </div>
</div>

<script>
// ========================

let allData = {};
let currentCat = null;
let currentItems = [];
let filteredItems = [];
let page = 1;
const PAGE_SIZE = 50;
let sortCol = 'cod';
let sortAsc = true;
let searchTerm = '';
let presupuesto = [];

const CAT_LABELS = {
  'A0': 'Auxiliares',
  'C0': 'Control Calidad',
  'C1': 'Ensayos Suelos',
  'DEMOLICION': 'Demolición',
  'E1': 'Estructuras',
  'JARDINERIA': 'Jardinería',
  'CARGA': 'Carga y Transporte',
  'MONTAJE': 'Montaje',
  'N0': 'Instalaciones',
  'AISLAMIENTO': 'Aislamiento',
  'R0': 'Revestimientos',
  'ALQUILERES': 'Alquileres',
  'U0': 'Urbanización',
  'MANO DE OBRA': 'Mano de Obra',
  'MATERIALES': 'Materiales',
  'MAQUINARIA': 'Maquinaria'
};

async function init() {
  document.getElementById('load-status').textContent = 'Descomprimiendo base de datos...';
  await new Promise(r => setTimeout(r, 50));

  const binary = atob(DATA_B64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const decompressed = pako.inflate(bytes, { to: 'string' });
  const raw = JSON.parse(decompressed);

  document.getElementById('load-status').textContent = 'Indexando registros...';
  await new Promise(r => setTimeout(r, 50));

  let total = 0;
  for (const [sheet, rows] of Object.entries(raw)) {
    allData[sheet] = rows.map(r => ({
      cod: r[0], uni: r[1], res: r[2], precio: r[3]
    }));
    total += rows.length;
  }

  document.getElementById('db-info').textContent = `BASE DE PRECIOS · ${total.toLocaleString('es-ES')} PARTIDAS`;
  document.getElementById('loading').style.display = 'none';

  buildCategories();
  selectCat(Object.keys(allData)[0]);
  document.getElementById('pres-fecha').valueAsDate = new Date();
  document.getElementById('search').addEventListener('input', e => {
    searchTerm = e.target.value.trim().toLowerCase();
    page = 1;
    applyFilter();
  });
}

function buildCategories() {
  const el = document.getElementById('categories');
  el.innerHTML = '';

  // All option
  const all = document.createElement('div');
  all.className = 'cat-item';
  all.innerHTML = `<span class="cat-name">🔍 Todas las categorías</span><span class="cat-count">${Object.values(allData).reduce((a,b)=>a+b.length,0)}</span>`;
  all.onclick = () => selectCat('ALL');
  all.id = 'cat-ALL';
  el.appendChild(all);

  for (const [key, items] of Object.entries(allData)) {
    const d = document.createElement('div');
    d.className = 'cat-item';
    d.id = 'cat-' + key;
    const label = CAT_LABELS[key] || key;
    d.innerHTML = `<span class="cat-name">${label}</span><span class="cat-count">${items.length}</span>`;
    d.onclick = () => selectCat(key);
    el.appendChild(d);
  }
}

function selectCat(key) {
  currentCat = key;
  document.querySelectorAll('.cat-item').forEach(e => e.classList.remove('active'));
  const el = document.getElementById('cat-' + key);
  if (el) el.classList.add('active');

  if (key === 'ALL') {
    currentItems = Object.values(allData).flat();
  } else {
    currentItems = allData[key] || [];
  }
  page = 1;
  applyFilter();
}

function applyFilter() {
  if (searchTerm.length >= 2) {
    filteredItems = [];
    // Search across all categories if term is long enough
    const source = searchTerm.length >= 3 ? Object.values(allData).flat() : currentItems;
    for (const item of source) {
      if (item.cod.toLowerCase().includes(searchTerm) ||
          item.res.toLowerCase().includes(searchTerm)) {
        filteredItems.push(item);
      }
    }
  } else {
    filteredItems = [...currentItems];
  }
  sortItems();
  renderTable();
  renderPagination();
}

function sort(col) {
  if (sortCol === col) { sortAsc = !sortAsc; }
  else { sortCol = col; sortAsc = true; }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted');
    if (th.id === 'th-' + col) th.classList.add('sorted');
  });
  page = 1;
  sortItems();
  renderTable();
  renderPagination();
}

function sortItems() {
  filteredItems.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

function highlight(text) {
  if (!searchTerm || searchTerm.length < 2) return escHtml(text);
  const idx = text.toLowerCase().indexOf(searchTerm);
  if (idx === -1) return escHtml(text);
  return escHtml(text.slice(0, idx)) +
    '<mark class="highlight">' + escHtml(text.slice(idx, idx + searchTerm.length)) + '</mark>' +
    escHtml(text.slice(idx + searchTerm.length));
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderTable() {
  const start = (page - 1) * PAGE_SIZE;
  const slice = filteredItems.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('table-body');
  const info = document.getElementById('results-info');

  info.textContent = `Mostrando ${start+1}–${Math.min(start+PAGE_SIZE, filteredItems.length)} de ${filteredItems.length.toLocaleString('es-ES')} resultados`;

  if (slice.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted)">Sin resultados</td></tr>';
    return;
  }

  tbody.innerHTML = slice.map((item, i) => `
    <tr onclick="rowClick(${start+i})" data-idx="${start+i}">
      <td class="cod">${highlight(item.cod)}</td>
      <td>${highlight(item.res)}</td>
      <td class="uni">${escHtml(item.uni)}</td>
      <td class="precio">${item.precio.toFixed(2).replace('.',',')} €</td>
      <td class="add-btn"><button class="btn-add" onclick="event.stopPropagation();addItem(${start+i})" title="Añadir al presupuesto">+</button></td>
    </tr>
  `).join('');
}

function rowClick(idx) {
  addItem(idx);
}

function renderPagination() {
  const total = Math.ceil(filteredItems.length / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (total <= 1) { el.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>← Ant</button>`;

  const range = 3;
  let pages = new Set([1, total]);
  for (let p = Math.max(1, page-range); p <= Math.min(total, page+range); p++) pages.add(p);
  pages = [...pages].sort((a,b)=>a-b);

  let prev = null;
  for (const p of pages) {
    if (prev && p - prev > 1) html += '<span class="page-info">…</span>';
    html += `<button class="page-btn ${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`;
    prev = p;
  }

  html += `<button class="page-btn" onclick="goPage(${page+1})" ${page===total?'disabled':''}>Sig →</button>`;
  html += `<span class="page-info">${page}/${total}</span>`;
  el.innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filteredItems.length / PAGE_SIZE);
  page = Math.max(1, Math.min(p, total));
  renderTable();
  renderPagination();
  document.querySelector('.table-wrap').scrollTop = 0;
}

// ========================
// PRESUPUESTO
// ========================
function addItem(idx) {
  const item = filteredItems[idx];
  if (!item) return;

  // Check duplicates
  const existing = presupuesto.find(p => p.cod === item.cod);
  if (existing) {
    existing.qty++;
    toast('Cantidad actualizada: ' + item.cod);
  } else {
    presupuesto.push({ ...item, qty: 1, id: Date.now() + Math.random() });
    toast('Añadido: ' + item.cod);
  }
  renderPres();
}

function removeItem(id) {
  presupuesto = presupuesto.filter(p => p.id !== id);
  renderPres();
}

function updateQty(id, val) {
  const item = presupuesto.find(p => p.id === id);
  if (item) {
    // Accept both comma and dot as decimal separator
    const normalized = String(val).replace(',', '.');
    const parsed = parseFloat(normalized);
    if (!isNaN(parsed) && parsed > 0) {
      item.qty = parsed;
    } else if (parsed <= 0 || isNaN(parsed)) {
      item.qty = 0.01;
    }
    renderPres();
  }
}

function renderPres() {
  const el = document.getElementById('pres-items');
  if (presupuesto.length === 0) {
    el.innerHTML = `<div class="pres-empty">
      <div class="icon">📄</div>
      <p>Haz clic en <strong>+</strong> en cualquier partida<br>para añadirla al presupuesto</p>
    </div>`;
    updateTotals();
    return;
  }

  el.innerHTML = presupuesto.map(item => {
    const subtotal = (item.qty * item.precio).toFixed(2).replace('.',',');
    return `
    <div class="line-item" id="li-${item.id}">
      <div class="line-top">
        <div class="line-desc">
          <div class="code">${escHtml(item.cod)} · ${escHtml(item.uni)}</div>
          <div>${escHtml(item.res)}</div>
        </div>
        <button class="line-remove" onclick="removeItem(${item.id})">✕</button>
      </div>
      <div class="line-controls">
        <label>CANT.</label>
        <input type="text" inputmode="decimal" value="${item.qty}"
          class="qty-input"
          onchange="updateQty(${item.id}, this.value)"
          onkeydown="if(event.key==='Enter')this.blur()" />
        <span class="line-unit">× ${item.precio.toFixed(2).replace('.',',')} €/${escHtml(item.uni)}</span>
        <span class="line-total">${subtotal} €</span>
      </div>
    </div>`;
  }).join('');
  updateTotals();
}

function updateTotals() {
  const base = presupuesto.reduce((s, i) => s + i.qty * i.precio, 0);
  const ivaPct = parseFloat(document.getElementById('iva-pct').value) || 0;
  const iva = base * ivaPct / 100;
  const total = base + iva;
  const fmt = n => n.toLocaleString('es-ES', {minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
  document.getElementById('total-base').textContent = fmt(base);
  document.getElementById('total-iva').textContent = fmt(iva);
  document.getElementById('total-final').textContent = fmt(total);
}

function clearPres() {
  if (presupuesto.length === 0) return;
  if (!confirm('¿Vaciar el presupuesto?')) return;
  presupuesto = [];
  renderPres();
}

// ========================
// EXPORT EXCEL
// ========================
function exportExcel() {
  if (presupuesto.length === 0) { toast('El presupuesto está vacío'); return; }

  const titulo = document.getElementById('pres-titulo').value || 'Presupuesto';
  const cliente = document.getElementById('pres-cliente').value || '';
  const fecha = document.getElementById('pres-fecha').value || new Date().toISOString().slice(0,10);
  const obs = document.getElementById('pres-obs').value || '';
  const ivaPct = parseFloat(document.getElementById('iva-pct').value) || 21;

  const wb = XLSX.utils.book_new();

  // Data rows
  const base = presupuesto.reduce((s,i)=>s+i.qty*i.precio,0);
  const iva = base * ivaPct / 100;
  const total = base + iva;

  const rows = [
    [titulo],
    ['Cliente:', cliente, '', 'Fecha:', fecha],
    obs ? ['Observaciones:', obs] : [],
    [],
    ['Nº', 'CÓDIGO', 'DESCRIPCIÓN', 'UNIDAD', 'CANTIDAD', 'PRECIO/UD (€)', 'IMPORTE (€)'],
    ...presupuesto.map((item, i) => [
      i+1, item.cod, item.res, item.uni, item.qty, item.precio, item.qty * item.precio
    ]),
    [],
    ['', '', '', '', '', 'SUBTOTAL', base],
    ['', '', '', '', '', `IVA (${ivaPct}%)`, iva],
    ['', '', '', '', '', 'TOTAL', total],
  ].filter(r => r.length > 0);

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Column widths
  ws['!cols'] = [
    {wch:4},{wch:14},{wch:50},{wch:8},{wch:10},{wch:14},{wch:14}
  ];

  // Basic styling via cell formats
  const headerRow = 4; // 0-indexed row 4 = row 5 in Excel (1-indexed)
  const headers = ['A','B','C','D','E','F','G'];
  headers.forEach(col => {
    const cell = ws[col + (headerRow+1)];
    if (cell) cell.s = { font: { bold: true }, fill: { fgColor: { rgb: 'FF6B00' } } };
  });

  XLSX.utils.book_append_sheet(wb, ws, 'Presupuesto');

  // Second sheet: full item list reference
  const refRows = [
    ['CÓDIGO', 'UNIDAD', 'DESCRIPCIÓN', 'PRECIO (€)'],
    ...presupuesto.map(item => [item.cod, item.uni, item.res, item.precio])
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(refRows);
  ws2['!cols'] = [{wch:14},{wch:8},{wch:50},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Partidas');

  const filename = `${titulo.replace(/[^a-zA-Z0-9áéíóúñÁÉÍÓÚÑ ]/g,'_')}_${fecha}.xlsx`;
  XLSX.writeFile(wb, filename);
  toast('Excel exportado: ' + filename);
}

// ========================
// PRINT
// ========================
function printPres() {
  if (presupuesto.length === 0) { toast('El presupuesto está vacío'); return; }
  const titulo = document.getElementById('pres-titulo').value || 'Presupuesto';
  const cliente = document.getElementById('pres-cliente').value || '—';
  const fecha = document.getElementById('pres-fecha').value || '—';
  const obs = document.getElementById('pres-obs').value || '';
  const ivaPct = parseFloat(document.getElementById('iva-pct').value) || 21;
  const base = presupuesto.reduce((s,i)=>s+i.qty*i.precio,0);
  const iva = base * ivaPct / 100;
  const total = base + iva;
  const fmt = n => n.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';

  const rows = presupuesto.map((item,i) => `
    <tr>
      <td>${i+1}</td>
      <td style="font-family:monospace;font-size:11px">${item.cod}</td>
      <td>${item.res}</td>
      <td style="text-align:center">${item.uni}</td>
      <td style="text-align:right">${item.qty.toLocaleString('es-ES',{maximumFractionDigits:3})}</td>
      <td style="text-align:right">${item.precio.toFixed(2).replace('.',',')} €</td>
      <td style="text-align:right;font-weight:600">${fmt(item.qty*item.precio)}</td>
    </tr>`).join('');

  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>${titulo}</title>
  <style>
    body{font-family:Arial,sans-serif;font-size:12px;margin:30px;color:#111}
    h1{font-size:22px;margin-bottom:4px}
    .meta{color:#555;margin-bottom:20px;font-size:11px}
    table{width:100%;border-collapse:collapse;margin-bottom:20px}
    th{background:#ff6b00;color:#fff;padding:6px 8px;text-align:left;font-size:11px}
    td{padding:5px 8px;border-bottom:1px solid #eee;font-size:11px}
    tr:nth-child(even)td{background:#f9f9f9}
    .totals{float:right;width:260px}
    .totals table{font-size:12px}
    .totals td{border:none;padding:3px 6px}
    .totals .grand{font-weight:700;font-size:14px;border-top:2px solid #ff6b00}
    .obs{color:#555;font-size:11px;font-style:italic;margin-top:10px}
    @media print{@page{margin:15mm}}
  </style></head><body>
  <h1>${titulo}</h1>
  <div class="meta">Cliente: <strong>${cliente}</strong> &nbsp;·&nbsp; Fecha: <strong>${fecha}</strong></div>
  ${obs ? `<div class="obs">${obs}</div><br>` : ''}
  <table>
    <thead><tr><th>#</th><th>Código</th><th>Descripción</th><th>Ud</th><th style="text-align:right">Cant.</th><th style="text-align:right">Precio/Ud</th><th style="text-align:right">Importe</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="totals"><table>
    <tr><td>Subtotal</td><td style="text-align:right">${fmt(base)}</td></tr>
    <tr><td>IVA (${ivaPct}%)</td><td style="text-align:right">${fmt(iva)}</td></tr>
    <tr class="grand"><td>TOTAL</td><td style="text-align:right">${fmt(total)}</td></tr>
  </table></div>
  <script>window.onload=()=>window.print()<\/script>
  </body></html>`);
  w.document.close();
}

// ========================
// UTILS
// ========================
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

// ========================
// RESIZER
// ========================
(function() {
  const resizer = document.getElementById('resizer');
  const presPanel = document.querySelector('.presupuesto');
  let isResizing = false;
  let startX = 0;
  let startWidth = 0;

  resizer.addEventListener('mousedown', function(e) {
    isResizing = true;
    startX = e.clientX;
    startWidth = presPanel.offsetWidth;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!isResizing) return;
    const delta = startX - e.clientX; // panel crece hacia la izquierda
    const newWidth = Math.max(320, Math.min(900, startWidth + delta));
    presPanel.style.width = newWidth + 'px';
  });

  document.addEventListener('mouseup', function() {
    if (!isResizing) return;
    isResizing = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  // Touch support
  resizer.addEventListener('touchstart', function(e) {
    isResizing = true;
    startX = e.touches[0].clientX;
    startWidth = presPanel.offsetWidth;
    resizer.classList.add('dragging');
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', function(e) {
    if (!isResizing) return;
    const delta = startX - e.touches[0].clientX;
    const newWidth = Math.max(320, Math.min(900, startWidth + delta));
    presPanel.style.width = newWidth + 'px';
  }, { passive: false });

  document.addEventListener('touchend', function() {
    isResizing = false;
    resizer.classList.remove('dragging');
  });
})();
